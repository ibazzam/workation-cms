name: Run tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    name: PHPUnit + Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: workation_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d workation_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      matrix:
        php: [8.4, 8.5]

    env:
      APP_ENV: testing
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: workation_test
      DB_USERNAME: postgres
      DB_PASSWORD: postgres

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_pgsql, xml, gd

      - name: Cache Composer packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/composer
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-progress --no-suggest --prefer-dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install Node dependencies and build assets
        run: |
          npm ci --prefer-offline --no-audit --progress=false
          npm run build

      - name: Run JS coverage
        run: |
          npm run coverage

      # Removed debug listing step to tidy workflow

      - name: Check JS coverage thresholds
        continue-on-error: true
        run: |
          node -e "const fs=require('fs');const p=fs.existsSync('coverage-final.json')?'coverage-final.json':(fs.existsSync('coverage/coverage-final.json')?'coverage/coverage-final.json':null);if(!p){console.error('No coverage-final.json found');process.exit(1);}const cov=JSON.parse(fs.readFileSync(p));const keys=Object.keys(cov).filter(k=>k.includes('/resources/js/')); if(keys.length===0){console.error('No resource JS files found in coverage'); process.exit(1);}let totals={s:{t:0,c:0},f:{t:0,c:0},b:{t:0,c:0}};for(const k of keys){const file=cov[k];const s=file.s||{};const f=file.f||{};const b=file.b||{};totals.s.t+=Object.keys(s).length;totals.s.c+=Object.values(s).filter(x=>x>0).length;totals.f.t+=Object.keys(f).length;totals.f.c+=Object.values(f).filter(x=>x>0).length;totals.b.t+=Object.keys(b).reduce((a,i)=>a+(Array.isArray(b[i])?b[i].length:0),0);totals.b.c+=Object.keys(b).reduce((a,i)=>a+(Array.isArray(b[i])?b[i].filter(x=>x>0).length:0),0);}const pct=(n,m)=>(m?100*n/m:0);const s=pct(totals.s.c,totals.s.t).toFixed(2);const f=pct(totals.f.c,totals.f.t).toFixed(2);const b=pct(totals.b.c,totals.b.t).toFixed(2);console.log(`Resource JS coverage: statements ${s}%, functions ${f}%, branches ${b}%`);const minS=95,minF=95,minB=90;if(s<minS||f<minF||b<minB){console.error('Resource JS coverage below thresholds');process.exit(2);}console.log('Coverage thresholds met for resources/js');"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-php-${{ matrix.php }}
          path: |
            coverage/**
            coverage-final.json
            clover.xml
          if-no-files-found: warn

      - name: Prepare environment file
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          elif [ ! -f .env ]; then
            touch .env
          fi

      - name: Generate app key
        run: php artisan key:generate --force


      - name: Run migrations
        run: php artisan migrate --force


      - name: Install root Node dependencies (for DB-fix script)
        run: |
          npm ci --prefer-offline --no-audit --progress=false

      - name: Run tests
        run: composer test

  js-coverage:
    name: JS Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Node dependencies
        run: npm ci --prefer-offline --no-audit --progress=false

      - name: Run JS coverage
        run: |
          npm run coverage

      # Removed debug listing step to tidy workflow

      - name: Check JS coverage thresholds
        continue-on-error: true

      - name: Run DB fix script (ensure ServiceCategory.id default)
        run: |
          node scripts/db_fix_servicecategory.js

      - name: Verify ServiceCategory id default
        run: |
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client
          mkdir -p infra/backend/artifacts/diagnostics

          echo 'Checking information_schema for ServiceCategory.id default' | tee infra/backend/artifacts/diagnostics/servicecategory_id_check.txt
          col_default=$(psql "$DATABASE_URL" -t -A -c "SELECT column_default FROM information_schema.columns WHERE table_schema='public' AND table_name='ServiceCategory' AND column_name='id';") || true
          echo "column_default=$col_default" | tee -a infra/backend/artifacts/diagnostics/servicecategory_id_check.txt

          seq=$(psql "$DATABASE_URL" -t -A -c "SELECT pg_get_serial_sequence('"ServiceCategory"','id');") || true
          seq=$(echo "$seq" | xargs)
          echo "pg_get_serial_sequence=$seq" | tee -a infra/backend/artifacts/diagnostics/servicecategory_id_check.txt

          if [ -z "$col_default" ] || [ "$col_default" = "NULL" ]; then
            echo "ERROR: ServiceCategory.id has no column_default/identity attached." | tee -a infra/backend/artifacts/diagnostics/servicecategory_id_check.txt
            exit 1
          fi

          if [ -z "$seq" ] || [ "$seq" = "NULL" ]; then
            echo "ERROR: No sequence attached to ServiceCategory.id (pg_get_serial_sequence returned empty)." | tee -a infra/backend/artifacts/diagnostics/servicecategory_id_check.txt
            exit 1
          fi

          echo "Inspecting sequence $seq" | tee -a infra/backend/artifacts/diagnostics/servicecategory_id_check.txt
          psql "$DATABASE_URL" -c "SELECT last_value, is_called FROM $seq;" | tee -a infra/backend/artifacts/diagnostics/servicecategory_id_check.txt

      - name: Upload DB-fix verification artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: servicecategory-id-check-${{ matrix.suite }}
          path: infra/backend/artifacts/diagnostics/servicecategory_id_check.txt
          if-no-files-found: warn
        run: |
          node -e "const fs=require('fs');const p=fs.existsSync('coverage-final.json')?'coverage-final.json':(fs.existsSync('coverage/coverage-final.json')?'coverage/coverage-final.json':null);if(!p){console.error('No coverage-final.json found');process.exit(1);}const cov=JSON.parse(fs.readFileSync(p));let totals={s:{t:0,c:0},f:{t:0,c:0},b:{t:0,c:0}};for(const k of Object.keys(cov)){const file=cov[k];const s=file.s||{};const f=file.f||{};const b=file.b||{};totals.s.t+=Object.keys(s).length;totals.s.c+=Object.values(s).filter(x=>x>0).length;totals.f.t+=Object.keys(f).length;totals.f.c+=Object.values(f).filter(x=>x>0).length;totals.b.t+=Object.keys(b).reduce((a,i)=>a+(Array.isArray(b[i])?b[i].length:0),0);totals.b.c+=Object.keys(b).reduce((a,i)=>a+(Array.isArray(b[i])?b[i].filter(x=>x>0).length:0),0);}const pct=(n,m)=>(m?100*n/m:0);const s=pct(totals.s.c,totals.s.t).toFixed(2);const f=pct(totals.f.c,totals.f.t).toFixed(2);const b=pct(totals.b.c,totals.b.t).toFixed(2);console.log(`Coverage percentages: statements ${s}%, functions ${f}%, branches ${b}%`);const minS=95,minF=95,minB=90;if(s<minS||f<minF||b<minB){console.error('Coverage below thresholds');process.exit(2);}console.log('Coverage thresholds met');"

      - name: Create coverage summary file
        run: |
          node -e "const fs=require('fs');const p=fs.existsSync('coverage-final.json')?'coverage-final.json':(fs.existsSync('coverage/coverage-final.json')?'coverage/coverage-final.json':null); if(!p){ console.log('no coverage json'); process.exit(0);} const cov=JSON.parse(fs.readFileSync(p)); let totals={s:{t:0,c:0},f:{t:0,c:0},b:{t:0,c:0}}; for(const k of Object.keys(cov)){ if(!k.includes('/resources/js/') && !k.includes('resources\\js')) continue; const file=cov[k]; const s=file.s||{}; const f=file.f||{}; const b=file.b||{}; totals.s.t+=Object.keys(s).length; totals.s.c+=Object.values(s).filter(x=>x>0).length; totals.f.t+=Object.keys(f).length; totals.f.c+=Object.values(f).filter(x=>x>0).length; totals.b.t+=Object.keys(b).reduce((a,i)=>a+(Array.isArray(b[i])?b[i].length:0),0); totals.b.c+=Object.keys(b).reduce((a,i)=>a+(Array.isArray(b[i])?b[i].filter(x=>x>0).length:0),0);} const pct=(n,m)=>(m?100*n/m:0); const summary={statements:pct(totals.s.c,totals.s.t).toFixed(2),functions:pct(totals.f.c,totals.f.t).toFixed(2),branches:pct(totals.b.c,totals.b.t).toFixed(2)}; fs.writeFileSync('coverage-summary.json', JSON.stringify({summary, totals}, null, 2)); console.log('Wrote coverage-summary.json');"

      - name: Commit coverage summary to branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: EndBug/add-and-commit@v9
        with:
          author_name: github-actions
          author_email: actions@github.com
          message: 'ci: update coverage summary'
          add: 'coverage-summary.json'

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage/**
            coverage-final.json
            coverage/coverage-final.json
            coverage/coverage-summary.json
            coverage/*.html
            clover.xml
          if-no-files-found: warn

      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false

  contract-tests:
    name: Contract (${{ matrix.suite }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: [workations, auth, auth-strict, countries, islands, service-categories, vendors, accommodations, transports, bookings, payments, admin-settings, permissions-matrix, feature-flags]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: dbname
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d dbname"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/dbname
      # Prevent background jobs from running during contract tests in CI
      SKIP_BACKGROUND_JOBS: 'true'
      # Increase default health timeout for the contract harness (ms)
      CONTRACT_HEALTH_TIMEOUT_MS: '60000'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infra/backend/package-lock.json

      - name: Install backend dependencies
        working-directory: infra/backend
        run: npm ci --prefer-offline --no-audit --progress=false

      - name: Generate Prisma client
        working-directory: infra/backend
        run: npm run prisma:generate

      - name: Apply Prisma migrations
        working-directory: infra/backend
        run: npx prisma migrate deploy --schema=../prisma/schema.prisma

      - name: Install root Node dependencies (for DB-fix script)
        run: |
          npm ci --prefer-offline --no-audit --progress=false

      - name: Run DB fix script (ensure ServiceCategory.id default)
        run: |
          node scripts/db_fix_servicecategory.js

      - name: Verify ServiceCategory id default
        run: |
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client
          mkdir -p infra/backend/artifacts/diagnostics

          echo 'Checking information_schema for ServiceCategory.id default' | tee infra/backend/artifacts/diagnostics/servicecategory_id_check.txt
          col_default=$(psql "$DATABASE_URL" -t -A -c "SELECT column_default FROM information_schema.columns WHERE table_schema='public' AND table_name='ServiceCategory' AND column_name='id';") || true
          echo "column_default=$col_default" | tee -a infra/backend/artifacts/diagnostics/servicecategory_id_check.txt

          seq=$(psql "$DATABASE_URL" -t -A -c "SELECT pg_get_serial_sequence('"ServiceCategory"','id');") || true
          seq=$(echo "$seq" | xargs)
          echo "pg_get_serial_sequence=$seq" | tee -a infra/backend/artifacts/diagnostics/servicecategory_id_check.txt

          if [ -z "$col_default" ] || [ "$col_default" = "NULL" ]; then
            echo "ERROR: ServiceCategory.id has no column_default/identity attached." | tee -a infra/backend/artifacts/diagnostics/servicecategory_id_check.txt
            exit 1
          fi

          if [ -z "$seq" ] || [ "$seq" = "NULL" ]; then
            echo "ERROR: No sequence attached to ServiceCategory.id (pg_get_serial_sequence returned empty)." | tee -a infra/backend/artifacts/diagnostics/servicecategory_id_check.txt
            exit 1
          fi

          echo "Inspecting sequence $seq" | tee -a infra/backend/artifacts/diagnostics/servicecategory_id_check.txt
          psql "$DATABASE_URL" -c "SELECT last_value, is_called FROM $seq;" | tee -a infra/backend/artifacts/diagnostics/servicecategory_id_check.txt

      - name: Upload DB-fix verification artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: servicecategory-id-check-smoke-${{ matrix.suite }}
          path: infra/backend/artifacts/diagnostics/servicecategory_id_check.txt
          if-no-files-found: warn

      - name: Ensure ServiceCategory id default
        working-directory: infra/backend
        run: |
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "DO $$\nBEGIN\n  IF NOT EXISTS (\n    SELECT 1 FROM information_schema.columns\n    WHERE table_schema = 'public'\n      AND table_name = 'ServiceCategory'\n      AND column_name = 'id'\n      AND (identity_generation IS NOT NULL OR column_default IS NOT NULL)\n  ) THEN\n    -- create sequence if missing\n    IF NOT EXISTS (SELECT 1 FROM pg_class WHERE relkind = 'S' AND relname = 'servicecategory_id_seq') THEN\n      CREATE SEQUENCE servicecategory_id_seq;\n    END IF;\n\n    -- set sequence to max(id)+1 to avoid collisions\n    PERFORM setval('servicecategory_id_seq', COALESCE((SELECT MAX("id") FROM "ServiceCategory"), 0) + 1);\n\n    -- attach as default to id column\n    ALTER TABLE \"ServiceCategory\" ALTER COLUMN \"id\" SET DEFAULT nextval('servicecategory_id_seq');\n    ALTER SEQUENCE servicecategory_id_seq OWNED BY \"ServiceCategory\".\"id\";\n  END IF;\nEND\n$$;"

      - name: Check Prisma schema drift
        working-directory: infra/backend
        continue-on-error: true
        run: npx prisma migrate diff --from-url "$DATABASE_URL" --to-schema-datamodel ../prisma/schema.prisma --exit-code

      - name: Diagnostic: list migrated columns
        working-directory: infra/backend
        run: |
          set -e
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client
          mkdir -p artifacts/diagnostics
          psql "$DATABASE_URL" -c "SELECT table_schema, table_name, column_name FROM information_schema.columns WHERE (table_name, column_name) IN (('TransportDisruption','status'),('TransportDisruption','resolvedAt'),('PaymentBackgroundJob','attempts'),('PaymentReconciliationRun','source'),('PaymentWebhookEvent','eventType'),('Payment','source'),('Booking','updatedAt'),('Accommodation','minStayNights')) ORDER BY table_name, column_name;" | tee artifacts/diagnostics/columns.txt

      - name: Upload diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prisma-diagnostics-${{ matrix.suite }}
          path: infra/backend/artifacts/diagnostics/columns.txt
          if-no-files-found: warn

      - name: Run contract suite
        working-directory: infra/backend
        run: |
          mkdir -p artifacts/contract
          set -o pipefail
          npm run test:contract:${{ matrix.suite }} 2>&1 | tee artifacts/contract/${{ matrix.suite }}.log

      - name: Upload contract logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-logs-${{ matrix.suite }}
          path: infra/backend/artifacts/contract/${{ matrix.suite }}.log
          if-no-files-found: warn

  smoke-tests:
    name: Smoke (${{ matrix.suite }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: [payments]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: dbname
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d dbname"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/dbname
      SKIP_BACKGROUND_JOBS: 'true'
      CONTRACT_HEALTH_TIMEOUT_MS: '60000'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infra/backend/package-lock.json

      - name: Install backend dependencies
        working-directory: infra/backend
        run: npm ci --prefer-offline --no-audit --progress=false

      - name: Generate Prisma client
        working-directory: infra/backend
        run: npm run prisma:generate

      - name: Apply Prisma migrations
        working-directory: infra/backend
        run: npx prisma migrate deploy --schema=../prisma/schema.prisma

      - name: Check Prisma schema drift
        working-directory: infra/backend
        continue-on-error: true
        run: npx prisma migrate diff --from-url "$DATABASE_URL" --to-schema-datamodel ../prisma/schema.prisma --exit-code

      - name: Diagnostic: list migrated columns
        working-directory: infra/backend
        run: |
          set -e
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client
          mkdir -p artifacts/diagnostics
          psql "$DATABASE_URL" -c "SELECT table_schema, table_name, column_name FROM information_schema.columns WHERE (table_name, column_name) IN (('TransportDisruption','status'),('TransportDisruption','resolvedAt'),('PaymentBackgroundJob','attempts'),('PaymentReconciliationRun','source'),('PaymentWebhookEvent','eventType'),('Payment','source'),('Booking','updatedAt'),('Accommodation','minStayNights')) ORDER BY table_name, column_name;" | tee artifacts/diagnostics/columns.txt

      - name: Upload diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prisma-diagnostics-smoke-${{ matrix.suite }}
          path: infra/backend/artifacts/diagnostics/columns.txt
          if-no-files-found: warn

      - name: Run smoke suite
        working-directory: infra/backend
        run: |
          mkdir -p artifacts/smoke
          set -o pipefail
          npm run test:smoke:${{ matrix.suite }} 2>&1 | tee artifacts/smoke/${{ matrix.suite }}.log

      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-logs-${{ matrix.suite }}
          path: infra/backend/artifacts/smoke/${{ matrix.suite }}.log
          if-no-files-found: warn
