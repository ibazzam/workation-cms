name: Run tests

permissions:
  contents: write

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  tests:
    name: PHPUnit + Build
    runs-on: ubuntu-latest
    # debug removed (kept out of main); keep job env minimal
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install Composer dependencies
        run: composer install --no-progress --no-suggest --prefer-dist

      - name: Prepare SQLite database
        run: |
          mkdir -p database
          php -r "file_exists('database/database.sqlite') || touch('database/database.sqlite');"

      - name: Prepare environment file
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          elif [ ! -f .env ]; then
            touch .env
          fi

      - name: Generate app key
        run: php artisan key:generate --force

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests
        run: composer test

      - name: Upload coverage to Codecov (action)
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false

      - name: Retry Codecov upload (bash uploader)
        if: always()
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          set -e
          attempts=0
          max=3
          until [ $attempts -ge $max ]
          do
            attempts=$((attempts+1))
            echo "Codecov retry attempt $attempts"
            curl -sSfLo codecov "https://uploader.codecov.io/latest/linux/codecov" && chmod +x codecov || true
            if [ -x ./codecov ]; then
              ./codecov -t "$CODECOV_TOKEN" || echo "uploader exit $?"
            else
              echo "codecov uploader not available"
            fi
            sleep $((attempts * 5))
          done

  js-coverage:
    name: JS Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm ci --prefer-offline --no-audit --progress=false

      - name: Run JS coverage
        run: |
          npm run coverage

      - name: Upload coverage to Codecov (action)
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false

      - name: Retry Codecov upload (bash uploader)
        if: always()
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          set -e
          attempts=0
          max=3
          until [ $attempts -ge $max ]
          do
            attempts=$((attempts+1))
            echo "Codecov retry attempt $attempts"
            curl -sSfLo codecov "https://uploader.codecov.io/latest/linux/codecov" && chmod +x codecov || true
            if [ -x ./codecov ]; then
              ./codecov -t "$CODECOV_TOKEN" || echo "uploader exit $?"
            else
              echo "codecov uploader not available"
            fi
            sleep $((attempts * 5))
          done
