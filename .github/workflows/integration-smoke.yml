name: Integration smoke (PHP)

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main, feat/sprint-1-holds ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: workation
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d workation"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set CI metadata
        run: |
          echo "ARTIFACT_SUFFIX=${GITHUB_RUN_ID}" >> $GITHUB_ENV
        env:
          REPOSITORY: ${{ github.repository }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, pdo_pgsql

      - name: Ensure Composer
        run: |
          # setup-php usually provides composer; only install if missing
          composer --version || (php -r "copy('https://getcomposer.org/installer', 'composer-setup.php');" && php composer-setup.php --install-dir=/usr/local/bin --filename=composer && rm composer-setup.php)

      - name: Install dependencies
        run: composer install --no-progress --no-suggest --prefer-dist

      - name: Prepare environment
        run: |
          cp .env.example .env || true
          {
            echo "DB_CONNECTION=pgsql"
            echo "DB_HOST=127.0.0.1"
            echo "DB_PORT=5432"
            echo "DB_DATABASE=workation"
            echo "DB_USERNAME=postgres"
            echo "DB_PASSWORD=postgres"
          } >> .env

      - name: Wait for PostgreSQL
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          for i in {1..30}; do
            pg_isready -h 127.0.0.1 -p 5432 -U postgres -d workation && break
            sleep 2
          done

      - name: Generate application key
        run: php artisan key:generate --ansi

      - name: Run migrations
        run: |
          php artisan migrate --force

      - name: Run PHPUnit
        run: vendor/bin/phpunit --testdox --colors=never

      - name: Run transport job processing smoke
        run: php artisan transport:process-jobs --limit=5

      - name: Run transport reconciliation smoke
        run: php artisan transport:reconcile-holds --limit=5
