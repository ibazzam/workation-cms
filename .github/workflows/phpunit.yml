name: Run tests

permissions:
  contents: write

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  tests:
    name: PHPUnit + Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: workation
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d workation"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: workation
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    # debug removed (kept out of main); keep job env minimal
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_pgsql

      - name: Install Composer dependencies
        run: composer install --no-progress --no-suggest --prefer-dist

      - name: Wait for PostgreSQL
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          for i in {1..30}; do
            pg_isready -h 127.0.0.1 -p 5432 -U postgres -d workation && break
            sleep 2
          done

      - name: Prepare environment file
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          elif [ ! -f .env ]; then
            touch .env
          fi

      - name: Generate app key
        run: php artisan key:generate --force

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests
        run: composer test

      - name: Upload coverage to Codecov (action)
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false

      - name: Retry Codecov upload (bash uploader)
        if: always()
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          set -e
          attempts=0
          max=3
          until [ $attempts -ge $max ]
          do
            attempts=$((attempts+1))
            echo "Codecov retry attempt $attempts"
            curl -sSfLo codecov "https://uploader.codecov.io/latest/linux/codecov" && chmod +x codecov || true
            if [ -x ./codecov ]; then
              ./codecov -t "$CODECOV_TOKEN" || echo "uploader exit $?"
            else
              echo "codecov uploader not available"
            fi
            sleep $((attempts * 5))
          done

  js-coverage:
    name: JS Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm ci --prefer-offline --no-audit --progress=false

      - name: Enforce API contract/version policy
        run: npm run contract:policy

      - name: Check auth permission matrix
        run: npm run permissions:matrix:check

      - name: Run JS coverage
        run: |
          npm run coverage

      - name: Upload coverage to Codecov (action)
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false

      - name: Retry Codecov upload (bash uploader)
        if: always()
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          set -e
          attempts=0
          max=3
          until [ $attempts -ge $max ]
          do
            attempts=$((attempts+1))
            echo "Codecov retry attempt $attempts"
            curl -sSfLo codecov "https://uploader.codecov.io/latest/linux/codecov" && chmod +x codecov || true
            if [ -x ./codecov ]; then
              ./codecov -t "$CODECOV_TOKEN" || echo "uploader exit $?"
            else
              echo "codecov uploader not available"
            fi
            sleep $((attempts * 5))
          done
