name: Integration smoke (PHP)

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main, feat/sprint-1-holds ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, pdo_sqlite

      - name: Ensure Composer
        run: |
          # setup-php usually provides composer; only install if missing
          composer --version || (php -r "copy('https://getcomposer.org/installer', 'composer-setup.php');" && php composer-setup.php --install-dir=/usr/local/bin --filename=composer && rm composer-setup.php)

      - name: Install dependencies
        run: composer install --no-progress --no-suggest --prefer-dist

      - name: Prepare environment
        run: |
          cp .env.example .env || true
            php -r 'file_put_contents(".env", str_replace(["DB_CONNECTION=mysql","DB_DATABASE=homestead"],["DB_CONNECTION=sqlite","DB_DATABASE=database/database.sqlite"], file_get_contents(".env")));'

      - name: Ensure SQLite database file
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Generate application key
        run: php artisan key:generate --ansi
      
        - name: Run migrations
          run: |
            php artisan migrate --force

        - name: CI diagnostics (post-migrate)
          run: |
            echo "=== CI diagnostics (post-migrate) ==="
            echo "PWD: $(pwd)"
            php -v || true
            composer --version || true
            echo "Listing database dir:"; ls -la database || true
            echo ".env preview:"; sed -n '1,200p' .env || true
            echo "artisan migrate:status:"; php artisan migrate:status || true
            php -r "try { \$pdo = new PDO('sqlite:' . getcwd() . '/database/database.sqlite'); foreach((\$pdo->query(\"SELECT name FROM sqlite_master WHERE type='table';\")) as \$r) echo 'TBL: '.\$r['name']."\n"; } catch (Exception \$e) { echo 'PDO ERR: '.\$e->getMessage()."\n"; }" || true

      - name: Run PHPUnit
        run: vendor/bin/phpunit --testdox --colors=never

      - name: Run transport job processing smoke
        run: php artisan transport:process-jobs --limit=5

      - name: CI diagnostics (pre-transport-jobs)
        run: |
          echo "=== CI diagnostics (pre-transport-jobs) ==="
          echo "Listing database file info:"; ls -la database || true
          echo "DB path in env:"; grep -n "DB_DATABASE" .env || true
          echo "artisan migrate:status:"; php artisan migrate:status || true
          php -r "try { \$pdo = new PDO('sqlite:' . getcwd() . '/database/database.sqlite'); foreach((\$pdo->query(\"SELECT name FROM sqlite_master WHERE type='table';\")) as \$r) echo 'TBL: '.\$r['name']."\n"; } catch (Exception \$e) { echo 'PDO ERR: '.\$e->getMessage()."\n"; }" || true

      - name: Run transport reconciliation smoke
        run: php artisan transport:reconcile-holds --limit=5
